<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="農薬記録">
<title>農薬散布記録</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }
  header { background: #fff; border-bottom: 0.5px solid #c6c6c8; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 17px; font-weight: 600; text-align: center; }
  .tab-bar { display: flex; background: #fff; border-bottom: 0.5px solid #c6c6c8; position: sticky; top: 53px; z-index: 9; }
  .tab { flex: 1; padding: 10px 4px; border: none; background: transparent; font-size: 12px; color: #8e8e93; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; }
  .tab.active { color: #007aff; border-bottom-color: #007aff; font-weight: 500; }
  .section { display: none; padding: 16px; }
  .section.active { display: block; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #8e8e93; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; font-size: 16px; border: none; outline: none; padding: 6px 0; border-bottom: 0.5px solid #c6c6c8; background: transparent; font-family: inherit; color: #1c1c1e; }
  .form-group select { -webkit-appearance: none; }
  .form-group textarea { resize: none; height: 60px; border: 0.5px solid #c6c6c8; border-radius: 8px; padding: 8px; margin-top: 2px; }
  .form-group input:focus, .form-group select:focus { border-bottom-color: #007aff; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .volume-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
  .volume-row select { width: auto; min-width: 75px; font-size: 15px; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 10px; border: 0.5px solid #c6c6c8; border-radius: 10px; background: #fff; font-size: 15px; color: #8e8e93; cursor: pointer; font-family: inherit; text-align: center; }
  .type-btn.active { border-color: #007aff; color: #007aff; background: #f0f6ff; font-weight: 500; }
  .btn-save { width: 100%; padding: 14px; background: #007aff; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
  .btn-save:active { background: #0062cc; }
  .btn-save:disabled { background: #c7c7cc; cursor: not-allowed; }
  .btn-add { width: 100%; padding: 10px; background: transparent; border: 0.5px solid #007aff; border-radius: 10px; font-size: 14px; color: #007aff; cursor: pointer; font-family: inherit; margin-top: 4px; }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { width: 100%; padding: 8px; background: transparent; border: 0.5px solid #c6c6c8; border-radius: 8px; font-size: 13px; color: #8e8e93; cursor: pointer; font-family: inherit; margin-top: 6px; }
  .status { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 12px; display: none; }
  .status.success { background: #d1f2e0; color: #1a7f4b; display: block; }
  .status.error { background: #fde8e8; color: #c0392b; display: block; }
  .status.loading { background: #fff3cd; color: #856404; display: block; }
  .init-loading { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 15px; }
  .master-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid #f2f2f7; }
  .master-item:last-child { border-bottom: none; }
  .master-item-text { font-size: 15px; font-weight: 500; }
  .master-item-sub { font-size: 12px; color: #8e8e93; margin-top: 2px; }
  .master-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .edit-btn { background: none; border: none; color: #007aff; font-size: 14px; cursor: pointer; padding: 4px 8px; }
  .del-btn { background: none; border: none; color: #c7c7cc; font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .del-btn:active { color: #ff3b30; }
  .crop-block { background: #fff; border-radius: 12px; margin-bottom: 12px; overflow: hidden; border: 0.5px solid #e0e0e0; }
  .crop-block-header { padding: 12px 16px; background: #f8f8f8; border-bottom: 0.5px solid #e0e0e0; display: flex; align-items: center; gap: 8px; }
  .crop-block-body { padding: 12px 16px; }
  .pest-row { background: #f8f9ff; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; position: relative; }
  .pest-row-del { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #c7c7cc; font-size: 18px; cursor: pointer; line-height: 1; }
  .record-card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .record-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .record-date { font-size: 12px; color: #8e8e93; margin-bottom: 4px; }
  .record-main { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .record-sub { font-size: 14px; color: #3c3c43; }
  .record-note { font-size: 13px; color: #8e8e93; margin-top: 4px; }
  .record-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #e8f0fe; color: #1a56db; }
  .tag.green { background: #d1f2e0; color: #1a7f4b; }
  .tag.gray { background: #f2f2f7; color: #8e8e93; }
  .tag.orange { background: #fff0e0; color: #b85c00; }
  .sheet-label { font-size: 11px; color: #8e8e93; margin-top: 6px; }
  .empty { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 15px; }
  .section-label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .filter-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #c6c6c8; background: #fff; font-size: 13px; color: #3c3c43; cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: #007aff; color: #fff; border-color: #007aff; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; padding: 20px 16px 40px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; text-align: center; }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-cancel { background: #f2f2f7; color: #1c1c1e; }
  .btn-confirm { background: #007aff; color: #fff; }
  #dummy-iframe { display: none; }
</style>
</head>
<body>
<header><h1>🌾 農薬散布記録</h1></header>
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('master')">🌱 作物・タグ</button>
  <button class="tab" onclick="switchTab('input')">📝 作業記録</button>
  <button class="tab" onclick="switchTab('list')">📋 履歴</button>
</div>

<!-- タブ1：作物・タグ -->
<div id="tab-master" class="section active">
  <div id="status-master" class="status"></div>
  <div class="card">
    <div class="card-title">作物・タグを登録</div>
    <div class="row2">
      <div class="form-group">
        <label>作物名</label>
        <input type="text" id="m-crop" placeholder="例: 人参">
      </div>
      <div class="form-group">
        <label>タグ</label>
        <input type="text" id="m-field" placeholder="例: 北側">
      </div>
    </div>
    <div class="form-group">
      <label>耕起日</label>
      <input type="date" id="m-tillage">
    </div>
    <div class="form-group">
      <label>備考</label>
      <textarea id="m-note" placeholder="自由にメモを入力"></textarea>
    </div>
    <button class="btn-add" onclick="addMaster()">＋ 登録する</button>
  </div>
  <div class="section-label">登録済みの作物・タグ</div>
  <div class="card">
    <div id="master-list"><div class="init-loading">読み込み中...</div></div>
  </div>
</div>

<!-- タブ2：作業記録 -->
<div id="tab-input" class="section">
  <div id="status-input" class="status"></div>
  <div class="type-toggle">
    <button class="type-btn active" id="type-pest" onclick="switchType('pest')">💊 農薬散布</button>
    <button class="type-btn" id="type-other" onclick="switchType('other')">🔧 その他作業</button>
  </div>

  <!-- 農薬散布：一括入力 -->
  <div id="form-pest">
    <div class="card">
      <div class="form-group">
        <label>散布日</label>
        <input type="date" id="f-date">
      </div>
    </div>
    <div id="crop-blocks"></div>
    <button class="btn-add" onclick="addCropBlock()">＋ 作物・タグを追加</button>
    <button class="btn-save" id="save-pest-btn" onclick="savePest()" style="margin-top:16px">まとめて保存</button>
  </div>

  <!-- その他作業 -->
  <div id="form-other" style="display:none">
    <div class="card">
      <div class="card-title">その他作業</div>
      <div class="form-group">
        <label>作業日</label>
        <input type="date" id="o-date">
      </div>
      <div class="row2">
        <div class="form-group">
          <label>作物名</label>
          <select id="o-crop" onchange="updateFieldOptions('o-crop','o-field')">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>タグ</label>
          <select id="o-field">
            <option value="">選択してください</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>作業名</label>
        <input type="text" id="o-name" placeholder="例: パオパオ取り、定植">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="o-memo" placeholder="作業の詳細を自由に入力"></textarea>
      </div>
    </div>
    <button class="btn-save" id="save-other-btn" onclick="saveOther()">スプレッドシートに保存</button>
  </div>
</div>

<!-- タブ3：履歴 -->
<div id="tab-list" class="section">
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-key="all" onclick="filterRecords('all')">すべて</button>
  </div>
  <div id="list-status" class="status"></div>
  <button class="btn-add" id="reload-btn" onclick="loadRecords()" style="margin-bottom:12px">🔄 スプレッドシートから読み込む</button>
  <div id="records-list"></div>
</div>

<!-- 記録編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">記録を編集</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-confirm" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- マスタ編集モーダル -->
<div class="modal-overlay" id="master-modal">
  <div class="modal">
    <div class="modal-title">作物・タグを編集</div>
    <div class="form-group">
      <label>耕起日</label>
      <input type="date" id="edit-m-tillage">
    </div>
    <div class="form-group">
      <label>備考</label>
      <textarea id="edit-m-note" style="resize:none;height:80px;border:0.5px solid #c6c6c8;border-radius:8px;padding:8px;width:100%;font-size:16px;font-family:inherit;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMasterModal()">キャンセル</button>
      <button class="btn-confirm" onclick="saveMasterEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 農薬名サジェスト用datalist -->
<datalist id="pesticide-list"></datalist>

<iframe id="dummy-iframe" name="dummy-iframe"></iframe>
<form id="gas-form"
      action="https://script.google.com/macros/s/AKfycbzXH6Ikcv4WVk2QuvGZbDPzDwvr61imEH13QS3fRRILuD92RKIXq-Uuq1BMxUchYJWi0g/exec"
      method="POST" target="dummy-iframe" style="display:none;">
  <input type="hidden" name="type" id="h-type">
  <input type="hidden" name="payload" id="h-payload">
</form>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzXH6Ikcv4WVk2QuvGZbDPzDwvr61imEH13QS3fRRILuD92RKIXq-Uuq1BMxUchYJWi0g/exec';
let masters = [];
let sheetRecords = [];
let pesticideHistory = [];
let currentFilter = 'all';
let editingRecord = null;
let editingMaster = null;
let cropBlockCount = 0;
let pestRowCount = 0;

function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'status ' + type;
  if (type === 'success') setTimeout(() => el.style.display = 'none', 3000);
}

function submitGAS(data) {
  document.getElementById('h-type').value = data.type;
  document.getElementById('h-payload').value = JSON.stringify(data);
  document.getElementById('gas-form').submit();
}

// ─── 起動時初期化 ───
async function init() {
  try {
    const res = await fetch(GAS_URL + '?action=masters', { method: 'GET', mode: 'cors' });
    const data = await res.json();
    if (data.result === 'success') {
      masters = data.masters.map((m, i) => ({ ...m, id: i + 1 }));
      renderMasterList();
      updateAllCropSelects();
    }
  } catch(e) {
    document.getElementById('master-list').innerHTML = '<div class="empty">読み込みに失敗しました<br><small>通信環境を確認してください</small></div>';
  }
}

// ─── マスタ管理 ───
function addMaster() {
  const crop = document.getElementById('m-crop').value.trim();
  const field = document.getElementById('m-field').value.trim();
  const tillage = document.getElementById('m-tillage').value;
  const note = document.getElementById('m-note').value.trim();
  if (!crop || !field) { showStatus('status-master', '⚠️ 作物名とタグは必須です', 'error'); return; }
  if (masters.find(m => m.crop === crop && m.field === field)) { showStatus('status-master', '⚠️ すでに登録されています', 'error'); return; }
  const newM = { crop, field, tillage, note, id: Date.now() };
  masters.push(newM);
  document.getElementById('m-crop').value = '';
  document.getElementById('m-field').value = '';
  document.getElementById('m-tillage').value = '';
  document.getElementById('m-note').value = '';
  showStatus('status-master', '✓ 登録しました', 'success');
  renderMasterList();
  updateAllCropSelects();
  submitGAS({ type:'master', crop, field, tillage, note });
}

function deleteMaster(id) {
  if (!confirm('削除しますか？')) return;
  masters = masters.filter(m => m.id !== id);
  renderMasterList();
  updateAllCropSelects();
}

function openMasterEdit(id) {
  editingMaster = masters.find(m => m.id === id);
  if (!editingMaster) return;
  document.getElementById('edit-m-tillage').value = editingMaster.tillage || '';
  document.getElementById('edit-m-note').value = editingMaster.note || '';
  document.getElementById('master-modal').classList.add('open');
}

function closeMasterModal() {
  document.getElementById('master-modal').classList.remove('open');
  editingMaster = null;
}

function saveMasterEdit() {
  if (!editingMaster) return;
  editingMaster.tillage = document.getElementById('edit-m-tillage').value;
  editingMaster.note = document.getElementById('edit-m-note').value.trim();
  renderMasterList();
  submitGAS({ type:'master_update', crop: editingMaster.crop, field: editingMaster.field, tillage: editingMaster.tillage, note: editingMaster.note });
  closeMasterModal();
  showStatus('status-master', '✓ 更新しました', 'success');
}

function renderMasterList() {
  const el = document.getElementById('master-list');
  if (!masters.length) { el.innerHTML = '<div class="empty" style="padding:20px">まだ登録がありません</div>'; return; }
  el.innerHTML = masters.map(m =>
    '<div class="master-item">'
    + '<div style="flex:1">'
    + '<div class="master-item-text">' + m.crop + ' · ' + m.field + '</div>'
    + (m.tillage ? '<div class="master-item-sub">耕起日: ' + m.tillage + '</div>' : '')
    + (m.note ? '<div class="master-item-sub">📝 ' + m.note + '</div>' : '')
    + '</div>'
    + '<div class="master-actions">'
    + '<button class="edit-btn" onclick="openMasterEdit(' + m.id + ')">編集</button>'
    + '<button class="del-btn" onclick="deleteMaster(' + m.id + ')">×</button>'
    + '</div></div>'
  ).join('');
}

// ─── 農薬名サジェスト更新 ───
function updatePesticideList() {
  const names = [...new Set(sheetRecords.filter(r => r.pesticide).map(r => r.pesticide))];
  pesticideHistory = names;
  document.getElementById('pesticide-list').innerHTML = names.map(n => '<option value="' + n + '">').join('');
}

// ─── 作物選択肢 ───
function getCrops() { return [...new Set(masters.map(m => m.crop))]; }
function getFields(crop) { return masters.filter(m => m.crop === crop).map(m => m.field); }

function cropOptions(sel) {
  return '<option value="">作物を選択</option>' + getCrops().map(c => '<option value="' + c + '"' + (c===sel?' selected':'') + '>' + c + '</option>').join('');
}
function fieldOptions(crop, sel) {
  return '<option value="">タグを選択</option>' + getFields(crop).map(f => '<option value="' + f + '"' + (f===sel?' selected':'') + '>' + f + '</option>').join('');
}
function unitOptions(sel) {
  return ['kg/a','kg','cc','倍','%','g','袋','袋/a','L'].map(u => '<option' + (u===sel?' selected':'') + '>' + u + '</option>').join('');
}

function updateAllCropSelects() {
  // その他作業フォーム
  const oc = document.getElementById('o-crop');
  if (oc) { const v = oc.value; oc.innerHTML = '<option value="">選択してください</option>' + getCrops().map(c => '<option value="' + c + '"' + (c===v?' selected':'') + '>' + c + '</option>').join(''); updateFieldOptions('o-crop','o-field'); }
  // 作物ブロック
  document.querySelectorAll('[id^="cb-crop-"]').forEach(sel => {
    const blockId = sel.id.replace('cb-crop-','');
    const v = sel.value;
    sel.innerHTML = cropOptions(v);
    const fs = document.getElementById('cb-field-' + blockId);
    if (fs) fs.innerHTML = fieldOptions(v, fs.value);
  });
}

function updateFieldOptions(cropId, fieldId) {
  const crop = document.getElementById(cropId).value;
  document.getElementById(fieldId).innerHTML = fieldOptions(crop, '');
}

// ─── 農薬散布一括入力 ───
function initCropBlocks() {
  cropBlockCount = 0; pestRowCount = 0;
  document.getElementById('crop-blocks').innerHTML = '';
  addCropBlock();
}

function addCropBlock() {
  const id = ++cropBlockCount;
  const div = document.createElement('div');
  div.className = 'crop-block';
  div.id = 'cb-' + id;
  div.innerHTML =
    '<div class="crop-block-header">'
    + '<select id="cb-crop-' + id + '" onchange="onCropChange(' + id + ')" style="flex:1;font-size:15px;border:none;border-bottom:0.5px solid #c6c6c8;padding:4px 0;background:transparent;-webkit-appearance:none;margin-right:8px;">' + cropOptions() + '</select>'
    + '<select id="cb-field-' + id + '" style="flex:1;font-size:15px;border:none;border-bottom:0.5px solid #c6c6c8;padding:4px 0;background:transparent;-webkit-appearance:none;margin-right:8px;"><option value="">タグを選択</option></select>'
    + (cropBlockCount > 1 ? '<button class="del-btn" onclick="removeCropBlock(' + id + ')">×</button>' : '')
    + '</div>'
    + '<div class="crop-block-body">'
    + '<div id="pest-rows-' + id + '"></div>'
    + '<button class="btn-ghost" onclick="addPestRow(' + id + ')">＋ 農薬を追加</button>'
    + '</div>';
  document.getElementById('crop-blocks').appendChild(div);
  addPestRow(id);
}

function removeCropBlock(id) { document.getElementById('cb-' + id).remove(); }

function onCropChange(id) {
  const crop = document.getElementById('cb-crop-' + id).value;
  document.getElementById('cb-field-' + id).innerHTML = fieldOptions(crop, '');
}

function addPestRow(blockId) {
  const rid = ++pestRowCount;
  const div = document.createElement('div');
  div.className = 'pest-row';
  div.id = 'pr-' + rid;
  div.innerHTML =
    '<button class="pest-row-del" onclick="removePestRow(' + rid + ')">×</button>'
    + '<div class="form-group" style="margin-bottom:8px;padding-right:24px"><label>農薬名</label><input type="text" id="pr-pest-' + rid + '" list="pesticide-list" placeholder="例: スミチオン乳剤（履歴から選択可）"></div>'
    + '<div class="row2">'
    + '<div class="form-group" style="margin-bottom:0"><label>使用量</label><div class="volume-row"><input type="number" id="pr-vol-' + rid + '" placeholder="量"><select id="pr-unit-' + rid + '">' + unitOptions() + '</select></div></div>'
    + '<div class="form-group" style="margin-bottom:0"><label>面積(a)</label><input type="number" id="pr-area-' + rid + '" placeholder="面積"></div>'
    + '</div>'
    + '<div class="form-group" style="margin-bottom:0;margin-top:8px"><label>メモ</label><input type="text" id="pr-memo-' + rid + '" placeholder="任意"></div>';
  document.getElementById('pest-rows-' + blockId).appendChild(div);
}

function removePestRow(rid) { const el = document.getElementById('pr-' + rid); if (el) el.remove(); }

function savePest() {
  const date = document.getElementById('f-date').value;
  if (!date) { showStatus('status-input', '⚠️ 散布日を入力してください', 'error'); return; }
  const rows = [];
  for (const block of document.querySelectorAll('.crop-block')) {
    const blockId = block.id.replace('cb-','');
    const crop = document.getElementById('cb-crop-' + blockId).value;
    const field = document.getElementById('cb-field-' + blockId).value;
    if (!crop || !field) { showStatus('status-input', '⚠️ 作物とタグを選択してください', 'error'); return; }
    for (const pd of block.querySelectorAll('.pest-row')) {
      const rid = pd.id.replace('pr-','');
      const pest = document.getElementById('pr-pest-' + rid).value.trim();
      if (!pest) { showStatus('status-input', '⚠️ 農薬名を入力してください', 'error'); return; }
      rows.push({ date, crop, field, pesticide: pest, volume: document.getElementById('pr-vol-' + rid).value, unit: document.getElementById('pr-unit-' + rid).value, area: document.getElementById('pr-area-' + rid).value, memo: document.getElementById('pr-memo-' + rid).value.trim() });
    }
  }
  if (!rows.length) { showStatus('status-input', '⚠️ 記録がありません', 'error'); return; }
  document.getElementById('save-pest-btn').disabled = true;
  showStatus('status-input', '送信中...', 'loading');
  submitGAS({ type:'pest', rows: JSON.stringify(rows) });
  setTimeout(() => {
    showStatus('status-input', '✓ ' + rows.length + '件保存しました', 'success');
    document.getElementById('save-pest-btn').disabled = false;
    initCropBlocks();
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }, 2000);
}

// ─── その他作業 ───
function saveOther() {
  const d = { type:'other', date: document.getElementById('o-date').value, crop: document.getElementById('o-crop').value, field: document.getElementById('o-field').value, workname: document.getElementById('o-name').value.trim(), memo: document.getElementById('o-memo').value.trim() };
  if (!d.date || !d.crop || !d.field || !d.workname) { showStatus('status-input', '⚠️ 作業日・作物・タグ・作業名は必須です', 'error'); return; }
  document.getElementById('save-other-btn').disabled = true;
  showStatus('status-input', '送信中...', 'loading');
  submitGAS(d);
  setTimeout(() => {
    showStatus('status-input', '✓ 保存しました', 'success');
    document.getElementById('o-name').value = '';
    document.getElementById('o-memo').value = '';
    document.getElementById('save-other-btn').disabled = false;
  }, 2000);
}

// ─── 履歴 ───
function filterRecords(key) {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  renderList();
}

async function loadRecords() {
  const btn = document.getElementById('reload-btn');
  const st = document.getElementById('list-status');
  btn.disabled = true;
  st.textContent = '読み込み中...';
  st.className = 'status loading';
  try {
    const res = await fetch(GAS_URL + '?action=records', { method: 'GET', mode: 'cors' });
    const data = await res.json();
    if (data.result === 'success') {
      sheetRecords = data.records;
      updatePesticideList();
      st.textContent = '✓ ' + sheetRecords.length + '件読み込みました';
      st.className = 'status success';
      setTimeout(() => st.style.display = 'none', 3000);
      renderList();
    }
  } catch(e) {
    st.textContent = '✗ 読み込みに失敗しました';
    st.className = 'status error';
  } finally {
    btn.disabled = false;
  }
}

function renderList() {
  const filtered = currentFilter === 'all' ? sheetRecords : sheetRecords.filter(r => r.crop === currentFilter);
  const crops = [...new Set(sheetRecords.map(r => r.crop))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '<button class="filter-btn' + (currentFilter==='all'?' active':'') + '" data-key="all" onclick="filterRecords(\'all\')">すべて</button>'
    + crops.map(c => '<button class="filter-btn' + (currentFilter===c?' active':'') + '" data-key="' + c + '" onclick="filterRecords(\'' + c + '\')">' + c + '</button>').join('');
  const el = document.getElementById('records-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty">📋<br><br>「読み込む」ボタンを押してください</div>'; return; }
  el.innerHTML = filtered.map(r => {
    const isPest = r.kind === '農薬散布';
    const idx = sheetRecords.indexOf(r);
    return '<div class="record-card">'
      + '<div class="record-header">'
      + '<div><div class="record-date">' + (r.date||'') + '</div>'
      + '<div class="record-main">' + (isPest ? (r.pesticide||'') : (r.workname||'')) + '</div>'
      + '<div class="record-sub">' + (r.crop||'') + ' · ' + (r.field||'') + '</div></div>'
      + '<button class="edit-btn" onclick="openEdit(' + idx + ')">編集</button>'
      + '</div>'
      + '<div class="record-tags">'
      + '<span class="tag ' + (isPest ? '' : 'orange') + '">' + (isPest ? '💊 農薬散布' : '🔧 その他作業') + '</span>'
      + (isPest && r.volume ? '<span class="tag green">' + r.volume + (r.unit||'') + '</span>' : '')
      + (isPest && r.area ? '<span class="tag green">' + r.area + 'a</span>' : '')
      + '</div>'
      + (r.memo ? '<div class="record-note">📝 ' + r.memo + '</div>' : '')
      + '<div class="sheet-label">📄 ' + (r.crop||'') + '_' + (r.field||'') + '</div>'
      + '</div>';
  }).join('');
}

// ─── 編集モーダル ───
function openEdit(idx) {
  editingRecord = { ...sheetRecords[idx], idx };
  const r = editingRecord;
  const isPest = r.kind === '農薬散布';
  document.getElementById('modal-title').textContent = isPest ? '農薬散布を編集' : 'その他作業を編集';
  let html = '<div class="form-group"><label>日付</label><input type="date" id="ed-date" value="' + (r.date||'') + '"></div>';
  if (isPest) {
    html += '<div class="form-group"><label>農薬名</label><input type="text" id="ed-pest" list="pesticide-list" value="' + (r.pesticide||'') + '"></div>'
      + '<div class="row2">'
      + '<div class="form-group"><label>使用量</label><input type="number" id="ed-vol" value="' + (r.volume||'') + '"></div>'
      + '<div class="form-group"><label>単位</label><select id="ed-unit">' + unitOptions(r.unit) + '</select></div>'
      + '</div>'
      + '<div class="form-group"><label>面積(a)</label><input type="number" id="ed-area" value="' + (r.area||'') + '"></div>';
  } else {
    html += '<div class="form-group"><label>作業名</label><input type="text" id="ed-work" value="' + (r.workname||'') + '"></div>';
  }
  html += '<div class="form-group"><label>メモ</label><input type="text" id="ed-memo" value="' + (r.memo||'') + '"></div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); editingRecord = null; }

function saveEdit() {
  if (!editingRecord) return;
  const r = editingRecord;
  const isPest = r.kind === '農薬散布';
  const updated = { type:'update', crop: r.crop, field: r.field, rowNum: r.rowNum, date: document.getElementById('ed-date').value, kind: r.kind, pesticide: isPest ? document.getElementById('ed-pest').value.trim() : '', volume: isPest ? document.getElementById('ed-vol').value : '', unit: isPest ? document.getElementById('ed-unit').value : '', area: isPest ? document.getElementById('ed-area').value : '', workname: !isPest ? document.getElementById('ed-work').value.trim() : '', memo: document.getElementById('ed-memo').value.trim() };
  submitGAS(updated);
  sheetRecords[r.idx] = { ...sheetRecords[r.idx], ...updated };
  closeModal();
  showStatus('list-status', '✓ 更新しました', 'success');
  renderList();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['master','input','list'][i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'input') { initCropBlocks(); updateAllCropSelects(); }
  if (name === 'list') renderList();
}

function switchType(type) {
  document.getElementById('type-pest').classList.toggle('active', type === 'pest');
  document.getElementById('type-other').classList.toggle('active', type === 'other');
  document.getElementById('form-pest').style.display = type === 'pest' ? 'block' : 'none';
  document.getElementById('form-other').style.display = type === 'other' ? 'block' : 'none';
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
document.getElementById('o-date').value = new Date().toISOString().split('T')[0];
init();
</script>
</body>
</html>
